<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfektionierung Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); font-family: system-ui; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.1); }
        input, select { background: rgba(30, 41, 59, 0.8) !important; border: 1px solid rgba(148, 163, 184, 0.3) !important; color: #fff !important; padding: 10px 12px !important; border-radius: 6px !important; }
        input:focus, select:focus { outline: none !important; border-color: #3b82f6 !important; }
        .stat { background: rgba(30, 41, 59, 0.4); padding: 16px; border-radius: 8px; text-align: center; }
        .btn { padding: 10px 16px; border-radius: 6px; font-weight: 600; border: none; cursor: pointer; background: #3b82f6; color: white; }
        .btn:hover { background: #2563eb; }
        .warning-badge { position: absolute; top: -8px; right: -8px; background: #dc2626; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; padding: 32px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .warning-item { background: rgba(220, 38, 38, 0.15); border-left: 4px solid #dc2626; padding: 16px; border-radius: 6px; margin-bottom: 12px; }
        .log-item { background: rgba(30, 41, 59, 0.5); border-left: 4px solid #3b82f6; padding: 16px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
        .split-progress { display: flex; gap: 4px; height: 24px; border-radius: 2px; overflow: hidden; }
        .split-bar { display: flex; align-items: center; justify-content: center; position: relative; transition: width 0.3s; flex: 1; }
        .split-text { font-size: 14px; font-weight: 700; color: #1f2937; }
        .bar-twoweek { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .bar-twoweek-done { background: linear-gradient(90deg, #10b981, #34d399); }
        .bar-sixweek { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    </style>
</head>
<body class="text-white min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
            <h1 class="text-4xl font-bold">📦 Konfektionierung Dashboard</h1>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn" id="warningBtn" onclick="showWarnings()" style="display: none; background: #dc2626;">
                    🚨 Planung <span class="warning-badge" id="warningCount">0</span>
                </button>
                <button class="btn" onclick="showAuditLog()" style="background: #8b5cf6;">📋 Log</button>
                <button class="btn" onclick="exportToExcel()" style="background: #16a34a;">📊 Export</button>
            </div>
        </div>
        <p class="text-slate-400 mb-8">6 Wochen Forecast + Tracking</p>

        <div class="glass rounded-xl p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">📅 Datum</label>
                    <input type="date" id="dateInput" onchange="updateDashboard()" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">⚠️ Min.</label>
                    <select id="filterSelect" onchange="updateDashboard()" class="w-full">
                        <option value="0">Alle</option>
                        <option value="10">≥ 10</option>
                        <option value="25">≥ 25</option>
                        <option value="50">≥ 50</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">👤 Name</label>
                    <input type="text" id="workerName" placeholder="Mitarbeiter" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">🔍 Suche</label>
                    <input type="text" id="searchInput" placeholder="Artikel" class="w-full" oninput="handleSearch()">
                </div>
            </div>
        </div>

        <div class="glass rounded-xl p-6 mb-6" id="periodInfo"></div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="stat">
                <div class="text-xs text-slate-400">Zu fertigen</div>
                <div class="text-3xl font-bold text-blue-300" id="statForecast">0</div>
            </div>
            <div class="stat">
                <div class="text-xs text-slate-400">Gefertigt</div>
                <div class="text-3xl font-bold text-emerald-300" id="statProduced">0</div>
            </div>
            <div class="stat">
                <div class="text-xs text-slate-400">Noch</div>
                <div class="text-3xl font-bold text-amber-300" id="statRemaining">0</div>
            </div>
            <div class="stat">
                <div class="text-xs text-slate-400">Fortschritt</div>
                <div class="text-3xl font-bold text-emerald-300" id="statProgress">0%</div>
            </div>
        </div>

        <div id="articlesList" class="space-y-3"></div>
    </div>

    <div id="warningModal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 22px; font-weight: 700; color: #dc2626; margin-bottom: 24px;">🚨 Kritische Artikel</h2>
            <div id="warningList"></div>
            <button onclick="document.getElementById('warningModal').classList.remove('active')" class="btn" style="margin-top: 20px; width: 100%;">✕ Schließen</button>
        </div>
    </div>

    <div id="auditModal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 22px; font-weight: 700; color: #3b82f6; margin-bottom: 24px;">📋 Audit-Log</h2>
            <div id="logList"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="exportCSV()" class="btn" style="flex: 1;">📥 CSV</button>
                <button onclick="document.getElementById('auditModal').classList.remove('active')" class="btn" style="flex: 1; background: #6b7280;">✕ Schließen</button>
            </div>
        </div>
    </div>

        let currentDate = getTodayDate();

        function getTodayDate() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('de-DE').format(Math.round(num));
        }

        function getProd(gtin) {
            return parseInt(localStorage.getItem('prod_' + gtin)) || 0;
        }

        function setProd(gtin, val) {
            localStorage.setItem('prod_' + gtin, val);
        }

        function getLog() {
            return JSON.parse(localStorage.getItem('log_all') || '[]');
        }

        function addLog(entry) {
            let logs = getLog();
            logs.push({...entry, ts: new Date().toISOString()});
            localStorage.setItem('log_all', JSON.stringify(logs));
        }

        function findWeekIndex(dateStr) {
            const targetDate = new Date(dateStr + 'T00:00:00');
            for (let i = 0; i < kw_dates.length; i++) {
                if (new Date(kw_dates[i] + 'T00:00:00') >= targetDate) return i;
            }
            return Math.max(0, kw_dates.length - 6);
        }

        function handleDailyInput(gtin, artName, event) {
            const val = parseInt(event.target.value);
            if (event.key === 'Enter') {
                event.preventDefault();
                if (isNaN(val) || val === 0) {
                    alert('⚠️ Bitte Menge eingeben!');
                    return;
                }
                addDailyProduction(gtin, artName, val);
            }
        }

        function addDailyProduction(gtin, artName, val) {
            const currentTotal = getProd(gtin);
            const newValue = currentTotal + val;
            
            if (newValue < 0) {
                alert('⚠️ Nicht negativ!');
                return;
            }
            
            setProd(gtin, newValue);
            const worker = document.getElementById('workerName').value.trim() || 'Unbekannt';
            addLog({gtin, article: artName, worker, oldValue: currentTotal, newValue, difference: val, date: new Date().toLocaleString('de-DE')});
            
            updateDashboard();
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            updateDashboard();
        }

        function showWarnings() {
            document.getElementById('warningModal').classList.add('active');
            const list = document.getElementById('warningList');
            if (warnings.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #94a3b8;">✓ Alle gedeckt!</p>';
            } else {
                list.innerHTML = warnings.map(w => `<div class="warning-item"><div style="color: #dc2626; font-weight: 700;">🚨 ${w.article}</div><p style="color: #94a3b8; font-size: 12px; margin: 4px 0;">2W: ${formatNumber(w.twoWeekBedarf)} | Gefertigt: ${formatNumber(w.produced)} | Noch: ${formatNumber(w.remaining)}</p></div>`).join('');
            }
        }

        function showAuditLog() {
            document.getElementById('auditModal').classList.add('active');
            const logs = getLog();
            const list = document.getElementById('logList');
            if (logs.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #94a3b8;">Keine Einträge</p>';
            } else {
                list.innerHTML = logs.slice().reverse().map(log => `<div class="log-item"><div style="font-weight: 600; color: #60a5fa;">🔄 ${log.article} - ${log.worker}</div><p style="color: #94a3b8; font-size: 12px; margin: 4px 0;">Alt: ${formatNumber(log.oldValue)} → Neu: ${formatNumber(log.newValue)}</p><p style="color: #94a3b8; font-size: 11px;">📅 ${log.date}</p></div>`).join('');
            }
        }

        function exportCSV() {
            const logs = getLog();
            let csv = 'Datum,Mitarbeiter,Artikel,Alt,Neu,Differenz\n';
            logs.forEach(log => csv += `${log.date},${log.worker},${log.article},${log.oldValue},${log.newValue},${log.difference}\n`);
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'audit_' + getTodayDate() + '.csv';
            a.click();
        }

        function exportToExcel() {
            const filterMin = parseInt(document.getElementById('filterSelect').value);
            const startIdx = findWeekIndex(document.getElementById('dateInput').value);
            const endIdx = Math.min(startIdx + 6, kw_dates.length);
            
            let artList = articles.map(art => {
                let forecast = 0;
                for (let i = startIdx; i < endIdx; i++) {
                    forecast += art.forecast[i] || 0;
                }
                const produced = getProd(art.gtin);
                return {name: art.name, gtin: art.gtin, kategorie: art.kategorie, forecast, produced, remaining: Math.max(0, forecast - produced)};
            }).filter(a => a.forecast >= filterMin);
            
            const wb = XLSX.utils.book_new();
            const wsData = [['KONFEKTIONIERUNG'], [], ['Artikel', 'GTIN', 'Kategorie', 'Zu fertigen', 'Gefertigt', 'Noch']];
            artList.forEach(row => wsData.push([row.name, row.gtin, row.kategorie, row.forecast, row.produced, row.remaining]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), 'Forecast');
            XLSX.writeFile(wb, 'Konfektionierung_' + getTodayDate() + '.xlsx');
        }

        function updateDashboard() {
            currentDate = document.getElementById('dateInput').value;
            const filterMin = parseInt(document.getElementById('filterSelect').value);
            const startIdx = findWeekIndex(currentDate);
            const endIdx = Math.min(startIdx + 6, kw_dates.length);
            const weeks = kw_dates.slice(startIdx, endIdx);

            if (!weeks.length) return;

            const startD = new Date(weeks[0] + 'T00:00:00');
            const endD = new Date(weeks[weeks.length - 1] + 'T00:00:00');

            document.getElementById('periodInfo').innerHTML = `<h3 style="font-size: 16px; font-weight: 700;">📆 ${startD.toLocaleDateString('de-DE')} - ${endD.toLocaleDateString('de-DE')}</h3>`;

            let artList = articles.map(art => {
                let forecast = 0;
                for (let i = startIdx; i < endIdx; i++) {
                    forecast += art.forecast[i] || 0;
                }
                const produced = getProd(art.gtin);
                const thisWeek = art.forecast[startIdx] || 0;
                const nextWeek = art.forecast[startIdx + 1] || 0;
                const twoWeekBedarf = thisWeek + nextWeek;
                
                return {
                    ...art,
                    forecast, produced,
                    remaining: Math.max(0, forecast - produced),
                    twoWeekBedarf: twoWeekBedarf
                };
            }).filter(a => a.forecast >= filterMin).sort((a, b) => b.forecast - a.forecast);

            if (searchQuery) {
                artList = artList.filter(a => 
                    a.name.toLowerCase().includes(searchQuery) || 
                    a.gtin.toLowerCase().includes(searchQuery)
                );
            }

            const totalForecast = artList.reduce((s, a) => s + a.forecast, 0);
            const totalProduced = artList.reduce((s, a) => s + a.produced, 0);
            const totalRemaining = artList.reduce((s, a) => s + a.remaining, 0);
            const progress = totalForecast > 0 ? Math.round((totalProduced / totalForecast) * 100) : 0;

            document.getElementById('statForecast').textContent = formatNumber(totalForecast);
            document.getElementById('statProduced').textContent = formatNumber(totalProduced);
            document.getElementById('statRemaining').textContent = formatNumber(totalRemaining);
            document.getElementById('statProgress').textContent = progress + '%';

            warnings = [];
            articles.forEach(art => {
                const produced = getProd(art.gtin);
                const thisWeek = art.forecast[startIdx] || 0;
                const nextWeek = art.forecast[startIdx + 1] || 0;
                const twoWeekBedarf = thisWeek + nextWeek;
                if (twoWeekBedarf > 0 && produced < twoWeekBedarf) {
                    warnings.push({article: art.name, gtin: art.gtin, twoWeekBedarf, produced, remaining: twoWeekBedarf - produced});

                        </div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;">
                            <div class="stat" style="padding: 12px;"><div style="font-size: 10px; color: #94a3b8;">Zu fertigen</div><div style="font-size: 18px; font-weight: 700; color: #3b82f6;">${formatNumber(art.forecast)}</div></div>
                            <div><label style="font-size: 10px; color: #94a3b8;">Gesamt</label><div style="padding: 10px; background: rgba(16, 185, 129, 0.15); border-radius: 6px; text-align: center; font-weight: 600; color: #6ee7b7; margin-top: 2px;">${formatNumber(art.produced)}</div></div>
                            <div class="stat" style="padding: 12px;"><div style="font-size: 10px; color: #94a3b8;">Noch</div><div style="font-size: 18px; font-weight: 700; color: ${art.remaining === 0 ? '#10b981' : '#f59e0b'};">${formatNumber(art.remaining)}</div></div>
                            <div class="stat" style="padding: 12px;"><div style="font-size: 10px; color: #94a3b8;">%</div><div style="font-size: 18px; font-weight: 700; color: #10b981;">${Math.round(prog6w)}%</div></div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
                            <input type="number" value="" onfocus="this.value=''" onkeypress="handleDailyInput('${art.gtin}', '${art.name}', event)" style="text-align: center; font-weight: 600; background: rgba(251, 191, 36, 0.15) !important; border: 1px solid rgba(251, 191, 36, 0.3) !important; color: #fbbf24 !important; padding: 10px !important; border-radius: 6px !important;" placeholder="Eingabe">
                            <button onclick="addDailyProduction('${art.gtin}', '${art.name}', parseInt(event.target.parentElement.querySelector('input').value) || 0)" style="padding: 10px; border-radius: 6px; font-weight: 600; border: none; cursor: pointer; background: #3b82f6; color: white;">✅ Buchen</button>
                        </div>
                        <div class="split-progress">
                            <div class="split-bar bar-twoweek" style="width: ${Math.min(prog2w, 100)}%; ${prog2w >= 100 ? 'background: linear-gradient(90deg, #10b981, #34d399);' : ''}"><span class="split-text">${Math.round(Math.min(prog2w, 100))}%</span></div>
                            <div class="split-bar bar-sixweek" style="width: ${Math.min(prog6w, 100)};"><span class="split-text">${Math.round(prog6w)}%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('dateInput').value = getTodayDate();
        updateDashboard();
    </script>
</body>
</html>
